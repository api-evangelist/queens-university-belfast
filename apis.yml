apis:
  - aid: queens-university-belfast:research-portal-oai
    name: Queen's University Belfast Research Portal (Pure OAI-PMH)
    description: >-
      OAI-PMH metadata harvesting endpoint for the Queen's University Belfast
      Research Portal, the institutional repository built on Elsevier Pure. It
      exposes research outputs, datasets, theses, and research activity metadata
      in standard OAI-PMH formats (including oai_dc and OpenAIRE CERIF). The
      endpoint responds to standard verbs such as ListMetadataFormats,
      ListRecords, ListSets, and GetRecord.
    humanURL: https://pure.qub.ac.uk/
    baseURL: https://pureadmin.qub.ac.uk/ws/oai
    tags: [ Research, Open Access, OAI-PMH, Repository, Pure, Metadata ]
    properties:
      - type: Documentation
        url: https://www.openarchives.org/OAI/openarchivesprotocol.html
      - type: HumanURL
        url: https://pure.qub.ac.uk/
  - aid: queens-university-belfast:pure-api
    name: Queen's University Belfast Research Portal (Pure REST API)
    description: >-
      The Elsevier Pure REST API deployed on the Queen's University Belfast
      Research Portal. It exposes a complete, machine-readable web services API
      (OpenAPI 3.0.1, Pure 5.35.3-4) for research information data — research
      outputs, persons, datasets, projects, activities, awards, organizations,
      and the classification schemes behind them. Requests are authenticated
      with an api-key security scheme.
    humanURL: https://pure.qub.ac.uk/
