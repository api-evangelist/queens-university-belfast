aid: queens-university-belfast
name: Queen's University Belfast
description: >-
  Queen's University Belfast is a Russell Group research-intensive university in
  Northern Ireland, United Kingdom, founded in 1845, and ranked #206 in the QS
  World University Rankings 2025. Its public, machine-readable developer
  footprint is limited and centered on research dissemination: the Queen's
  University Belfast Research Portal runs on Elsevier Pure and exposes an
  OAI-PMH harvesting endpoint for institutional research outputs, datasets, and
  theses. Most other digital services (student portal, applications portal,
  library discovery via Ex Libris Alma/Primo) are gated behind authentication
  and do not publish open developer documentation.
