  - date: '2026-06-03'
    rating: 2
    summary: >-
      Queen's University Belfast has a thin public API surface. The one
      confirmed, openly accessible programmatic interface is the Elsevier Pure
      Research Portal OAI-PMH endpoint, which I verified live (ListMetadataFormats
      returned valid OAI-PMH XML advertising oai_dc and OpenAIRE CERIF formats).
      No dedicated developer portal, no open REST API catalog, and no SignUp/API
      key flow were found. Student, applications, and library (Alma/Primo)
      systems are authentication-gated with no public docs. The Qmulus open data
      API belongs to Queen's University in Canada, not Belfast, and was excluded
      to avoid fabrication. Rating reflects a single niche research-metadata API.
    endpoints:
